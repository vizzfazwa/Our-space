/* LOGIN */
#loginScr{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.lbox{background:rgba(10,0,30,0.92);border:1px solid rgba(192,132,252,0.35);border-radius:26px;padding:32px 24px;width:100%;max-width:330px;text-align:center;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(100,0,200,0.4);animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{transform:scale(0.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.ltitle{font-family:"Dancing Script",cursive;font-size:2rem;background:linear-gradient(135deg,#e9d5ff,#c084fc,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.lsub{font-size:0.78rem;color:rgba(192,132,252,0.55);margin-bottom:20px;letter-spacing:1px;}
.user-cards{display:flex;gap:14px;justify-content:center;margin-bottom:4px;}
.ucard{flex:1;padding:14px 8px;border-radius:18px;border:2px solid transparent;cursor:pointer;transition:all 0.3s;text-align:center;}
.ucard:hover{transform:translateY(-4px);}
.ucard.fc{background:linear-gradient(135deg,rgba(155,28,46,0.3),rgba(225,29,72,0.2));border-color:rgba(225,29,72,0.4);}
.ucard.fc:hover{border-color:#e11d48;box-shadow:0 8px 25px rgba(225,29,72,0.4);}
.ucard.vc{background:linear-gradient(135deg,rgba(91,33,182,0.3),rgba(168,85,247,0.2));border-color:rgba(168,85,247,0.4);}
.ucard.vc:hover{border-color:#a855f7;box-shadow:0 8px 25px rgba(168,85,247,0.4);}
.ucard-icon{width:60px;height:60px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
.ucard.fc .ucard-icon{background:linear-gradient(135deg,#9b1c2e,#e11d48);}
.ucard-name{font-size:0.82rem;font-weight:700;}
.ucard.fc .ucard-name{color:#fb7185;}
.ucard.vc .ucard-name{color:#c084fc;}
.ucard-sub{font-size:0.62rem;opacity:0.6;margin-top:2px;}
.pass-wrap{display:none;margin-top:4px;}
.pass-in{width:100%;padding:11px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(192,132,252,0.3);border-radius:12px;color:#e9d5ff;font-family:"Quicksand",sans-serif;font-size:0.9rem;margin-bottom:9px;outline:none;transition:border-color 0.3s;}
.pass-in:focus{border-color:#a855f7;}
.pass-in::placeholder{color:rgba(192,132,252,0.35);}
.err{color:#f87171;font-size:0.75rem;margin-bottom:7px;display:none;}
.enter-btn{width:100%;padding:12px;border:none;border-radius:12px;font-family:"Quicksand",sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;margin-bottom:7px;transition:all 0.3s;}
.ef{background:linear-gradient(135deg,#9b1c2e,#e11d48);color:white;}
.ev{background:linear-gradient(135deg,#5b21b6,#7c3aed,#c084fc);color:white;}
.back-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(192,132,252,0.2);color:#c084fc;width:100%;padding:9px;border-radius:11px;font-family:"Quicksand",sans-serif;cursor:pointer;font-size:0.82rem;}

/* CHAT SCREEN */
#chatScr{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;}

/* HEADER */
.hdr{position:relative;z-index:10;padding:10px 14px;background:rgba(8,0,25,0.9);border-bottom:1px solid rgba(192,132,252,0.15);backdrop-filter:blur(20px);display:flex;align-items:center;gap:10px;}
.h-emoji{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:2px solid rgba(192,132,252,0.5);box-shadow:0 0 14px rgba(168,85,247,0.4);flex-shrink:0;cursor:pointer;transition:transform 0.2s;}
.h-emoji:active{transform:scale(0.85);}
.h-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:2px solid rgba(225,29,72,0.5);box-shadow:0 0 14px rgba(225,29,72,0.4);flex-shrink:0;background:linear-gradient(135deg,#9b1c2e,#e11d48);cursor:pointer;transition:transform 0.2s;}
.h-icon:active{transform:scale(0.85);}
.h-info{flex:1;min-width:0;}
.h-name{font-family:"Dancing Script",cursive;font-size:1.15rem;}
.h-name.fn{color:#fb7185;filter:drop-shadow(0 0 6px rgba(251,113,133,0.5));}
.h-name.vn{color:#c084fc;filter:drop-shadow(0 0 6px rgba(192,132,252,0.5));}
.h-status{font-size:0.62rem;letter-spacing:1px;margin-top:1px;}
.online-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#22c55e;margin-right:4px;animation:blink 1.5s ease infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}
.hdr-right{display:flex;align-items:center;gap:6px;margin-left:auto;}
.cam-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(192,132,252,0.2);color:#c084fc;width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;flex-shrink:0;}
.cam-btn:hover{background:rgba(192,132,252,0.15);}
.plus-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(192,132,252,0.2);color:#c084fc;width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;flex-shrink:0;}
.plus-btn:hover{background:rgba(192,132,252,0.15);}
.logout-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(192,132,252,0.2);color:#c084fc;padding:4px 10px;border-radius:18px;font-size:0.68rem;cursor:pointer;font-family:"Quicksand",sans-serif;}

/* MSGS */
#msgsArea{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:8px;position:relative;z-index:5;scroll-behavior:smooth;padding-bottom:20px;}
#msgsArea::-webkit-scrollbar{width:3px;}
#msgsArea::-webkit-scrollbar-thumb{background:#7c3aed;border-radius:2px;}
.msg-wrap{display:flex;align-items:flex-end;gap:6px;animation:msgIn 0.35s cubic-bezier(0.34,1.56,0.64,1);position:relative;}
@keyframes msgIn{from{transform:scale(0.7) translateY(15px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.msg-wrap.mine{flex-direction:row-reverse;}
.m-av-i{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;background:linear-gradient(135deg,#9b1c2e,#e11d48);}
.m-av-e{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.bubble-wrap{max-width:75%;display:flex;flex-direction:column;position:relative;}
.bubble{padding:9px 13px;border-radius:18px;font-size:0.87rem;line-height:1.5;word-break:break-word;cursor:pointer;position:relative;user-select:none;}
.bubble.mine.fb{background:linear-gradient(135deg,#9b1c2e,#e11d48);color:white;border-bottom-right-radius:4px;box-shadow:0 4px 13px rgba(225,29,72,0.4);}
.bubble.mine.vb{background:linear-gradient(135deg,#5b21b6,#7c3aed,#c084fc);color:white;border-bottom-right-radius:4px;box-shadow:0 4px 13px rgba(124,58,237,0.4);}
.bubble.theirs{background:linear-gradient(135deg,rgba(18,0,45,0.92),rgba(109,28,209,0.22));border:1px solid rgba(192,132,252,0.2);color:#e9d5ff;border-bottom-left-radius:4px;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
.msg-meta{font-size:0.6rem;opacity:0.5;margin-top:3px;display:flex;align-items:center;gap:4px;}
.msg-wrap.mine .msg-meta{justify-content:flex-end;}
.seen-tick{font-size:0.65rem;color:white;}
.seen-tick.seen{color:white;}
.date-div{text-align:center;font-size:0.68rem;color:rgba(192,132,252,0.45);padding:3px 11px;background:rgba(10,0,30,0.55);border-radius:18px;align-self:center;backdrop-filter:blur(8px);border:1px solid rgba(192,132,252,0.12);}
.empty-s{text-align:center;padding:50px 20px;font-family:"Dancing Script",cursive;color:rgba(192,132,252,0.3);font-size:1.2rem;}

/* MSG REACTION */
.msg-reaction{position:absolute;bottom:-10px;font-size:0.85rem;background:rgba(10,0,30,0.8);border-radius:10px;padding:1px 5px;border:1px solid rgba(192,132,252,0.2);}
.msg-wrap.mine .msg-reaction{left:0;}
.msg-wrap:not(.mine) .msg-reaction{right:0;}

/* REPLY PREVIEW */
.reply-preview{background:rgba(168,85,247,0.15);border-left:3px solid #a855f7;padding:6px 10px;border-radius:8px;margin-bottom:4px;font-size:0.75rem;color:#c084fc;max-width:100%;}
.reply-bar{display:none;padding:8px 14px;background:rgba(8,0,25,0.9);border-top:1px solid rgba(192,132,252,0.15);align-items:center;gap:8px;}
.reply-bar.show{display:flex;}
.reply-bar-txt{flex:1;font-size:0.78rem;color:#c084fc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reply-close{background:none;border:none;color:#c084fc;font-size:1.1rem;cursor:pointer;}

/* VOICE MSG BUBBLE */
.voice-bubble{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:18px;min-width:200px;cursor:pointer;}
.voice-bubble.mine.fb{background:linear-gradient(135deg,#9b1c2e,#e11d48);border-bottom-right-radius:4px;box-shadow:0 4px 13px rgba(225,29,72,0.4);}
.voice-bubble.mine.vb{background:linear-gradient(135deg,#5b21b6,#7c3aed);border-bottom-right-radius:4px;box-shadow:0 4px 13px rgba(124,58,237,0.4);}
.voice-bubble.theirs{background:linear-gradient(135deg,rgba(18,0,45,0.92),rgba(109,28,209,0.3));border:1px solid rgba(192,132,252,0.2);border-bottom-left-radius:4px;}
.vplay-btn{width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,0.25);color:white;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.vplay-btn:hover{background:rgba(255,255,255,0.4);}
.vwave{flex:1;height:28px;display:flex;align-items:center;gap:2px;}
.vbar{width:3px;background:rgba(255,255,255,0.4);border-radius:2px;height:6px;transition:height 0.1s;}
.vbar.active{background:rgba(255,255,255,0.9);}
.vdur{font-size:0.68rem;color:rgba(255,255,255,0.9);flex-shrink:0;font-weight:700;min-width:35px;text-align:right;}

/* INPUT */
.inp-area{position:relative;z-index:10;padding:8px 10px;background:rgba(8,0,25,0.92);border-top:1px solid rgba(192,132,252,0.15);backdrop-filter:blur(20px);}
.inp-row{display:flex;gap:8px;align-items:center;}
.emoji-toggle-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(192,132,252,0.25);background:rgba(255,255,255,0.05);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.3s;}
.msg-in{flex:1;padding:10px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(192,132,252,0.25);border-radius:22px;color:#e9d5ff;font-family:"Quicksand",sans-serif;font-size:0.87rem;outline:none;transition:all 0.3s;}
.msg-in:focus{border-color:#a855f7;box-shadow:0 0 12px rgba(168,85,247,0.3);}
.msg-in::placeholder{color:rgba(192,132,252,0.35);}
.mic-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(192,132,252,0.25);background:rgba(255,255,255,0.05);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.3s;padding:6px;}
.mic-btn img{width:100%;height:100%;object-fit:contain;}
.mic-btn.recording{border-color:#e11d48;background:rgba(225,29,72,0.2);animation:recPulse 1s ease infinite;}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(225,29,72,0.4);}50%{box-shadow:0 0 0 8px rgba(225,29,72,0);}}
.send-btn{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 13px rgba(124,58,237,0.5);transition:all 0.3s;flex-shrink:0;}
.send-btn:hover{transform:scale(1.1);}
.send-btn:active{transform:scale(0.92);}
.rec-status{text-align:center;font-size:0.75rem;color:#e11d48;padding:4px 0;display:none;}
.rec-status.show{display:block;}

/* LOVE ARROW - only animation kept */
.love-arrow{position:fixed;font-size:1.6rem;z-index:200;pointer-events:none;}

/* PROFILE TAB */
#profileTab{position:fixed;inset:0;z-index:150;display:none;align-items:flex-end;justify-content:center;}
#profileTab.show{display:flex;}
.pt-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);}
.pt-box{position:relative;z-index:1;background:rgba(10,0,30,0.96);border:1px solid rgba(192,132,252,0.3);border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:20px;max-height:80vh;overflow-y:auto;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.pt-head{text-align:center;margin-bottom:16px;}
.pt-emoji{font-size:4rem;display:block;margin-bottom:8px;}
.pt-name{font-family:"Dancing Script",cursive;font-size:1.8rem;color:#c084fc;}
.pt-close{position:absolute;top:14px;right:16px;background:rgba(255,255,255,0.08);border:none;color:#c084fc;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;}
.pt-counts{display:flex;justify-content:center;gap:20px;margin:12px 0;}
.pt-count-box{text-align:center;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);border-radius:14px;padding:10px 16px;}
.pt-count-num{font-size:1.4rem;font-weight:700;color:#c084fc;}
.pt-count-lbl{font-size:0.65rem;color:rgba(192,132,252,0.6);margin-top:2px;}
.pt-media-title{font-size:0.78rem;color:rgba(192,132,252,0.5);margin:14px 0 8px;letter-spacing:1px;}
.pt-media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
.pt-media-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid rgba(192,132,252,0.15);}

/* PLUS MINI TAB */
#plusTab{position:fixed;z-index:160;display:none;}
#plusTab.show{display:block;}
.plus-box{background:rgba(10,0,30,0.95);border:1px solid rgba(192,132,252,0.3);border-radius:16px;padding:12px;display:flex;gap:10px;box-shadow:0 8px 30px rgba(100,0,200,0.4);}
.react-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(192,132,252,0.2);border-radius:12px;padding:10px 14px;cursor:pointer;transition:all 0.2s;}
.react-btn:hover{background:rgba(168,85,247,0.2);transform:scale(1.05);}
.react-btn span:first-child{font-size:1.6rem;}
.react-btn span:last-child{font-size:0.6rem;color:rgba(192,132,252,0.6);}

/* REACTION OVERLAY */
#reactionOverlay{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;pointer-events:none;}
#reactionOverlay.show{display:flex;}
.reaction-center{text-align:center;animation:reactionPop 2.5s forwards;}
@keyframes reactionPop{0%{transform:scale(0);opacity:0;}20%{transform:scale(1.3);opacity:1;}80%{transform:scale(1);opacity:1;}100%{transform:scale(0.5);opacity:0;}}
.reaction-emoji-big{font-size:5rem;display:block;}
.reaction-text{font-family:"Dancing Script",cursive;font-size:1.3rem;color:#e9d5ff;margin-top:8px;}

/* TYPING */
.typing-indicator{display:flex;align-items:center;gap:6px;padding:8px 12px;}
.typing-dot{width:7px;height:7px;border-radius:50%;background:#a855f7;animation:typingBounce 1.2s ease infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-8px);}}

/* POPPER */
.popper{position:fixed;font-size:1.5rem;pointer-events:none;z-index:310;animation:popperFly 1.5s forwards;}
@keyframes popperFly{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-200px) scale(0.3) rotate(720deg);opacity:0;}}
</style>
</head>

// ─── VOICE BUBBLE ──────────────────────────────────────────
function createVoiceBubble(dataUrl,bubClass,isMine,sender){
  const div=document.createElement('div');div.className='voice-bubble '+bubClass;
  const playBtn=document.createElement('button');playBtn.className='vplay-btn';playBtn.textContent='▶';
  const audio=new Audio(dataUrl);
  const wave=document.createElement('div');wave.className='vwave';
  const bars=[];
  for(let i=0;i<12;i++){const b=document.createElement('div');b.className='vbar';b.style.animationDelay=(i*0.1)+'s';wave.appendChild(b);bars.push(b);}
  const dur=document.createElement('span');dur.className='vdur';dur.textContent='0:00';
  let totalDur=0;
  audio.addEventListener('loadedmetadata',()=>{totalDur=audio.duration;dur.textContent='0:00 / '+fmtTime(totalDur);});
  audio.addEventListener('timeupdate',()=>{
    const cur=audio.currentTime;
    dur.textContent=fmtTime(cur)+' / '+fmtTime(totalDur);
    // animate bars based on time
    const pct=totalDur>0?cur/totalDur:0;
    bars.forEach((b,i)=>{
      const active=i/bars.length<=pct;
      b.style.height=active?'18px':'6px';
      b.className='vbar'+(active?' active':'');
    });
  });
  audio.addEventListener('ended',()=>{playBtn.textContent='▶';dur.textContent='0:00 / '+fmtTime(totalDur);bars.forEach(b=>{b.style.height='6px';b.className='vbar';});});
  playBtn.onclick=()=>{
    if(audio.paused){audio.play();playBtn.textContent='⏸';}
    else{audio.pause();playBtn.textContent='▶';}
  };
  div.appendChild(playBtn);div.appendChild(wave);div.appendChild(dur);
  return div;
}
function fmtTime(s){
  if(!s||isNaN(s))return'0:00';
  const m=Math.floor(s/60),sec=Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

        const reader=new FileReader();
        reader.onload=async()=>{
          await api('POST','messages',{sender:me,content:'__VOICE__'+reader.result,seen:false});
          await loadMsgs();stream.getTracks().forEach(t=>t.stop());

        reader.readAsDataURL(blob);

      mediaRec.start();isRecording=true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('recStatus').classList.add('show');
    }catch(e){alert('Mic access needed!');}
  }else{
    mediaRec.stop();isRecording=false;

    document.getElementById('recStatus').classList.remove('show');
  }
}

    const kissSent=(Array.isArray(rData)?rData.filter(r=>r.sender===me&&r.type==='kiss'):{length:0}).length;
    const hugSent=(Array.isArray(rData)?rData.filter(r=>r.sender===me&&r.type==='hug'):{length:0}).length;
    const slapSent=(Array.isArray(rData)?rData.filter(r=>r.sender===me&&r.type==='slap'):{length:0}).length;
    const kissRec=(Array.isArray(rData)?rData.filter(r=>r.sender===other&&r.type==='kiss'):{length:0}).length;
    const hugRec=(Array.isArray(rData)?rData.filter(r=>r.sender===other&&r.type==='hug'):{length:0}).length;
    const slapRec=(Array.isArray(rData)?rData.filter(r=>r.sender===other&&r.type==='slap'):{length:0}).length;
    document.getElementById('ptCounts').innerHTML=`
      <div class="pt-count-box"><div class="pt-count-num">💋${kissRec}</div><div class="pt-count-lbl">Kisses received</div></div>
      <div class="pt-count-box"><div class="pt-count-num">🫂${hugRec}</div><div class="pt-count-lbl">Hugs received</div></div>
      <div class="pt-count-box"><div class="pt-count-num">😤${slapRec}</div><div class="pt-count-lbl">Slaps received</div></div>
      <div class="pt-count-box"><div class="pt-count-num">💋${kissSent}</div><div class="pt-count-lbl">Kisses sent</div></div>
      <div class="pt-count-box"><div class="pt-count-num">🫂${hugSent}</div><div class="pt-count-lbl">Hugs sent</div></div>
      <div class="pt-count-box"><div class="pt-count-num">😤${slapSent}</div><div class="pt-count-lbl">Slaps sent</div></div>
    `;
  }catch(e){}
  // Load shared images
  try{
    const msgs=await api('GET','messages?select=*&order=created_at.desc&limit=500');
    const imgs=Array.isArray(msgs)?msgs.filter(m=>m.content.startsWith('__IMG__')):[];
    const grid=document.getElementById('ptMediaGrid');
    if(imgs.length===0){grid.innerHTML='<div style="color:rgba(192,132,252,0.3);font-size:0.75rem;grid-column:span 3;text-align:center;padding:20px;">No photos yet 🌸</div>';}
    else{grid.innerHTML=imgs.slice(0,18).map(m=>`<img class="pt-media-img" src="${m.content.replace('__IMG__','')}" loading="lazy">`).join('');}
  }catch(e){}
  tab.classList.add('show');
}
function closeProfile(){document.getElementById('profileTab').classList.remove('show');}
function closeProfileIfBackdrop(e){if(e.target===document.getElementById('profileTab'))closeProfile();}
</script>
