.lbox{background:rgba(10,0,30,0.92);border:1px solid rgba(192,132,252,0.35);border-radius:26px;padding:32px 24px;width:100%;max-width:330px;text-align:center;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(100,0,200,0.4);animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{transform:scale(0.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.ltitle{font-family:"Dancing Script",cursive;font-size:2rem;background:linear-gradient(135deg,#e9d5ff,#c084fc,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.lsub{font-size:0.78rem;color:rgba(192,132,252,0.55);margin-bottom:20px;letter-spacing:1px;}
.user-cards{display:flex;gap:14px;justify-content:center;margin-bottom:4px;}
.ucard{flex:1;padding:14px 8px;border-radius:18px;border:2px solid transparent;cursor:pointer;transition:all 0.3s;text-align:center;}
.ucard:hover{transform:translateY(-4px);}
.ucard.fc{background:linear-gradient(135deg,rgba(155,28,46,0.3),rgba(225,29,72,0.2));border-color:rgba(225,29,72,0.4);}
.ucard.fc:hover{border-color:#e11d48;box-shadow:0 8px 25px rgba(225,29,72,0.4);}
.ucard.vc{background:linear-gradient(135deg,rgba(91,33,182,0.3),rgba(168,85,247,0.2));border-color:rgba(168,85,247,0.4);}
.ucard.vc:hover{border-color:#a855f7;box-shadow:0 8px 25px rgba(168,85,247,0.4);}
.ucard-img{width:60px;height:60px;border-radius:50%;object-fit:cover;margin:0 auto 8px;border:2px solid rgba(255,255,255,0.2);}
.ucard-icon{width:60px;height:60px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;background:linear-gradient(135deg,#9b1c2e,#e11d48);}
.ucard-name{font-size:0.82rem;font-weight:700;}
.ucard.fc .ucard-name{color:#fb7185;}
.ucard.vc .ucard-name{color:#c084fc;}
.ucard-sub{font-size:0.62rem;opacity:0.6;margin-top:2px;}
.pass-wrap{display:none;margin-top:4px;}
.pass-in{width:100%;padding:11px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(192,132,252,0.3);border-radius:12px;color:#e9d5ff;font-family:"Quicksand",sans-serif;font-size:0.9rem;margin-bottom:9px;outline:none;transition:border-color 0.3s;}
.pass-in:focus{border-color:#a855f7;}
.pass-in::placeholder{color:rgba(192,132,252,0.35);}
.err{color:#f87171;font-size:0.75rem;margin-bottom:7px;display:none;}
.enter-btn{width:100%;padding:12px;border:none;border-radius:12px;font-family:"Quicksand",sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;margin-bottom:7px;transition:all 0.3s;}
.ef{background:linear-gradient(135deg,#9b1c2e,#e11d48);color:white;}
.ev{background:linear-gradient(135deg,#5b21b6,#7c3aed,#c084fc);color:white;}
.back-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(192,132,252,0.2);color:#c084fc;width:100%;padding:9px;border-radius:11px;font-family:"Quicksand",sans-serif;cursor:pointer;font-size:0.82rem;}

/* CHAT SCREEN */
#chatScr{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;}

/* HEADER */
.hdr{position:relative;z-index:10;padding:10px 14px;background:rgba(8,0,25,0.9);border-bottom:1px solid rgba(192,132,252,0.15);backdrop-filter:blur(20px);display:flex;align-items:center;gap:10px;}
.h-pic{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid rgba(192,132,252,0.5);box-shadow:0 0 14px rgba(168,85,247,0.4);flex-shrink:0;animation:picPulse 2.5s ease infinite;}
.h-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:2px solid rgba(225,29,72,0.5);box-shadow:0 0 14px rgba(225,29,72,0.4);flex-shrink:0;background:linear-gradient(135deg,#9b1c2e,#e11d48);animation:picPulse 2.5s ease infinite;}
@keyframes picPulse{0%,100%{box-shadow:0 0 14px rgba(168,85,247,0.4);}50%{box-shadow:0 0 25px rgba(168,85,247,0.8);}}
.h-info{flex:1;min-width:0;}
.h-name{font-family:"Dancing Script",cursive;font-size:1.15rem;}
.h-name.fn{color:#fb7185;filter:drop-shadow(0 0 6px rgba(251,113,133,0.5));}
.h-name.vn{color:#c084fc;filter:drop-shadow(0 0 6px rgba(192,132,252,0.5));}
.h-status{font-size:0.62rem;letter-spacing:1px;margin-top:1px;}
.online-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#22c55e;margin-right:4px;animation:blink 1.5s ease infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}
.hdr-right{display:flex;align-items:center;gap:6px;margin-left:auto;}
.hdr-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(192,132,252,0.2);color:#c084fc;width:32px;height:32px;border-radius:50%;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;flex-shrink:0;}
.hdr-btn:hover{background:rgba(192,132,252,0.15);}
.logout-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(192,132,252,0.2);color:#c084fc;padding:4px 10px;border-radius:18px;font-size:0.68rem;cursor:pointer;font-family:"Quicksand",sans-serif;}

/* MSGS */
#msgsArea{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:8px;position:relative;z-index:5;scroll-behavior:smooth;padding-bottom:20px;}
#msgsArea::-webkit-scrollbar{width:3px;}
#msgsArea::-webkit-scrollbar-thumb{background:#7c3aed;border-radius:2px;}
.msg-wrap{display:flex;align-items:flex-end;gap:6px;animation:msgIn 0.35s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes msgIn{from{transform:scale(0.7) translateY(15px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.msg-wrap.mine{flex-direction:row-reverse;}
.m-av{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid rgba(255,255,255,0.2);}
.m-av-i{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;background:linear-gradient(135deg,#9b1c2e,#e11d48);}
.bubble-wrap{max-width:75%;display:flex;flex-direction:column;}
.bubble{padding:9px 13px;border-radius:18px;font-size:0.87rem;line-height:1.5;word-break:break-word;}
.bubble.mine.fb{background:linear-gradient(135deg,#9b1c2e,#e11d48);color:white;border-bottom-right-radius:4px;box-shadow:0 4px 13px rgba(225,29,72,0.4);}
.bubble.mine.vb{background:linear-gradient(135deg,#5b21b6,#7c3aed,#c084fc);color:white;border-bottom-right-radius:4px;box-shadow:0 4px 13px rgba(124,58,237,0.4);}
.bubble.theirs{background:linear-gradient(135deg,rgba(18,0,45,0.92),rgba(109,28,209,0.22));border:1px solid rgba(192,132,252,0.2);color:#e9d5ff;border-bottom-left-radius:4px;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
.msg-meta{font-size:0.6rem;opacity:0.5;margin-top:3px;display:flex;align-items:center;gap:4px;}
.msg-wrap.mine .msg-meta{justify-content:flex-end;}
.seen-tick{font-size:0.65rem;}
.seen-tick.seen{color:#a855f7;}
.date-div{text-align:center;font-size:0.68rem;color:rgba(192,132,252,0.45);padding:3px 11px;background:rgba(10,0,30,0.55);border-radius:18px;align-self:center;backdrop-filter:blur(8px);border:1px solid rgba(192,132,252,0.12);}
.empty-s{text-align:center;padding:50px 20px;font-family:"Dancing Script",cursive;color:rgba(192,132,252,0.3);font-size:1.2rem;}

/* VOICE MSG BUBBLE */
.voice-bubble{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:18px;min-width:180px;}
.voice-bubble.mine.fb{background:linear-gradient(135deg,#9b1c2e,#e11d48);border-bottom-right-radius:4px;box-shadow:0 4px 13px rgba(225,29,72,0.4);}
.voice-bubble.mine.vb{background:linear-gradient(135deg,#5b21b6,#7c3aed);border-bottom-right-radius:4px;box-shadow:0 4px 13px rgba(124,58,237,0.4);}
.voice-bubble.theirs{background:linear-gradient(135deg,rgba(18,0,45,0.92),rgba(109,28,209,0.3));border:1px solid rgba(192,132,252,0.2);border-bottom-left-radius:4px;}
.vplay-btn{width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,0.25);color:white;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.vplay-btn:hover{background:rgba(255,255,255,0.4);}
.vwave{flex:1;height:28px;display:flex;align-items:center;gap:2px;}
.vbar{width:3px;background:rgba(255,255,255,0.5);border-radius:2px;animation:waveAnim 1.2s ease infinite;}
@keyframes waveAnim{0%,100%{height:6px;}50%{height:18px;}}
.vdur{font-size:0.68rem;color:rgba(255,255,255,0.7);flex-shrink:0;}

/* INPUT */
.inp-area{position:relative;z-index:10;padding:8px 10px;background:rgba(8,0,25,0.92);border-top:1px solid rgba(192,132,252,0.15);backdrop-filter:blur(20px);}
.inp-row{display:flex;gap:8px;align-items:center;}
.voice-rec-btn{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,0.07);color:#c084fc;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.3s;border:1px solid rgba(192,132,252,0.25);}
.voice-rec-btn.recording{background:rgba(225,29,72,0.3);border-color:#e11d48;animation:recPulse 1s ease infinite;}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(225,29,72,0.4);}50%{box-shadow:0 0 0 8px rgba(225,29,72,0);}}
.msg-in{flex:1;padding:10px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(192,132,252,0.25);border-radius:22px;color:#e9d5ff;font-family:"Quicksand",sans-serif;font-size:0.87rem;outline:none;transition:all 0.3s;}
.msg-in:focus{border-color:#a855f7;box-shadow:0 0 12px rgba(168,85,247,0.3);}
.msg-in::placeholder{color:rgba(192,132,252,0.35);}
.send-btn{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 13px rgba(124,58,237,0.5);transition:all 0.3s;flex-shrink:0;}
.send-btn:hover{transform:scale(1.1);}
.send-btn:active{transform:scale(0.92);}
.rec-status{text-align:center;font-size:0.75rem;color:#e11d48;padding:4px 0;display:none;}
.rec-status.show{display:block;}

/* LOVE ARROW */
.love-arrow{position:fixed;font-size:1.6rem;z-index:200;pointer-events:none;}

/* PETS */
.w-cat{position:fixed;bottom:70px;font-size:1.5rem;z-index:8;pointer-events:none;animation:catWalk 14s linear infinite;}
@keyframes catWalk{0%{left:-7%;transform:scaleX(1);}49%{left:107%;transform:scaleX(1);}50%{left:107%;transform:scaleX(-1);}99%{left:-7%;transform:scaleX(-1);}100%{left:-7%;transform:scaleX(1);}}
.b-teddy{position:fixed;right:8px;bottom:70px;font-size:1.4rem;z-index:8;pointer-events:none;animation:tB 2.8s ease infinite;}
@keyframes tB{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-14px) rotate(4deg);}}
</style>
</head>

function selUser(u){selU=u;document.getElementById('selSec').style.display='none';const ps=document.getElementById('passSec');ps.style.display='block';const eb=document.getElementById('enterBtn');eb.className='enter-btn '+(u==='fawaz'?'ef':'ev');document.getElementById('passIn').focus();}
function goBack(){selU=null;document.getElementById('selSec').style.display='flex';document.getElementById('passSec').style.display='none';document.getElementById('errMsg').style.display='none';document.getElementById('passIn').value='';}
function doLogin(){
  if(document.getElementById('passIn').value===PASS[selU]){
    me=selU;
    document.getElementById('loginScr').style.display='none';

// API
async function api(method,path,body){
  const r=await fetch(SB+'/rest/v1/'+path,{method,headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=minimal':''},body:body?JSON.stringify(body):undefined});
  if(method==='GET')return r.json();
  return r;
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ONLINE STATUS
async function updateOnline(){
  try{
    const existing=await api('GET',`online_status?select=*&user_id=eq.${me}`);
    if(Array.isArray(existing)&&existing.length>0){
      await api('PATCH',`online_status?user_id=eq.${me}`,{last_seen:new Date().toISOString()});
    }else{
      await api('POST','online_status',{user_id:me,last_seen:new Date().toISOString()});
    }
  }catch(e){}
}
async function checkOnline(){
  try{
    const other=me==='fawaz'?'pathumma':'fawaz';
    const data=await api('GET',`online_status?select=*&user_id=eq.${other}`);
    const st=document.getElementById('hStatus');
    if(Array.isArray(data)&&data.length>0){
      const lastSeen=new Date(data[0].last_seen);
      const diffSec=(Date.now()-lastSeen.getTime())/1000;
      if(diffSec<30){
        st.innerHTML='<span class="online-dot"></span><span style="color:#22c55e;font-size:0.62rem;letter-spacing:1px;">online now 🟢</span>';
      }else if(diffSec<3600){
        const mins=Math.floor(diffSec/60);
        st.innerHTML=`<span style="color:rgba(192,132,252,0.4);font-size:0.62rem;">last seen ${mins}m ago</span>`;
      }else{
        const hrs=Math.floor(diffSec/3600);
        st.innerHTML=`<span style="color:rgba(192,132,252,0.4);font-size:0.62rem;">last seen ${hrs}h ago</span>`;
      }
    }else{
      st.innerHTML='<span style="color:rgba(192,132,252,0.3);font-size:0.62rem;">✨ always here for you ✨</span>';
    }
  }catch(e){}
}

// MESSAGES
async function loadMsgs(){
  try{
    const data=await api('GET','messages?select=*&order=created_at.asc&limit=500');
    if(!Array.isArray(data))return;
    const area=document.getElementById('msgsArea');
    const empty=document.getElementById('emptyS');
    if(data.length>0&&empty)empty.remove();
    let scrollNeeded=false;

    // Mark unseen messages from other person as seen
    const other=me==='fawaz'?'pathumma':'fawaz';
    const unseen=data.filter(m=>m.sender===other&&!m.seen);
    if(unseen.length>0){
      unseen.forEach(async m=>{
        await api('PATCH',`messages?id=eq.${m.id}`,{seen:true,seen_at:new Date().toISOString()});
      });
    }

    data.forEach(msg=>{
      if(rendered.has(msg.id)){
        // update seen status on existing bubble
        const el=document.querySelector(`[data-id="${msg.id}"] .seen-tick`);
        if(el&&msg.sender===me){el.textContent=msg.seen?'✓✓':'✓';el.className='seen-tick'+(msg.seen?' seen':'');}
        return;
      }
      rendered.add(msg.id);scrollNeeded=true;

      const d=new Date(msg.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
      if(d!==lastDate){lastDate=d;const dv=document.createElement('div');dv.className='date-div';dv.textContent='✦ '+d+' ✦';area.appendChild(dv);}

      const isMine=msg.sender===me;
      const u=msg.sender;
      const wrap=document.createElement('div');
      wrap.className='msg-wrap '+(isMine?'mine':'theirs');
      wrap.setAttribute('data-id',msg.id);

      // avatar
      let av;
      if(u==='pathumma'){av=document.createElement('img');av.className='m-av';av.src=HER_FACE;}
      else{av=document.createElement('div');av.className='m-av-i';av.textContent='🧸';}

      const bwrap=document.createElement('div');bwrap.className='bubble-wrap';
      const bubClass=isMine?'mine '+(u==='fawaz'?'fb':'vb'):'theirs';

      // check if voice message
      let bub;
      if(msg.content.startsWith('__VOICE__')){
        bub=createVoiceBubble(msg.content.replace('__VOICE__',''),bubClass,isMine,u);
      }else{
        bub=document.createElement('div');bub.className='bubble '+bubClass;
        bub.innerHTML=esc(msg.content);
      }

      const t=new Date(msg.created_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      const meta=document.createElement('div');meta.className='msg-meta';
      const timeSpan=document.createElement('span');timeSpan.textContent=t;
      meta.appendChild(timeSpan);

      if(isMine){
        const tick=document.createElement('span');
        tick.className='seen-tick'+(msg.seen?' seen':'');
        tick.textContent=msg.seen?'✓✓':'✓';
        meta.appendChild(tick);
      }

      bwrap.appendChild(bub);bwrap.appendChild(meta);
      if(isMine){wrap.appendChild(bwrap);wrap.appendChild(av);}
      else{wrap.appendChild(av);wrap.appendChild(bwrap);}
      area.appendChild(wrap);
    });
    if(scrollNeeded)area.scrollTop=area.scrollHeight;
  }catch(e){console.log('load err',e);}
}

function createVoiceBubble(dataUrl,bubClass,isMine,sender){
  const div=document.createElement('div');
  div.className='voice-bubble '+bubClass;
  const playBtn=document.createElement('button');
  playBtn.className='vplay-btn';playBtn.textContent='▶';
  const audio=new Audio(dataUrl);
  audio.addEventListener('ended',()=>{playBtn.textContent='▶';bars.forEach(b=>b.style.animationPlayState='paused');});
  const wave=document.createElement('div');wave.className='vwave';
  const bars=[];
  for(let i=0;i<12;i++){const b=document.createElement('div');b.className='vbar';b.style.animationDelay=(i*0.1)+'s';b.style.animationPlayState='paused';wave.appendChild(b);bars.push(b);}
  const dur=document.createElement('span');dur.className='vdur';dur.textContent='🎤';
  audio.addEventListener('loadedmetadata',()=>{dur.textContent=Math.round(audio.duration)+'s';});
  playBtn.onclick=()=>{
    if(audio.paused){audio.play();playBtn.textContent='⏸';bars.forEach(b=>b.style.animationPlayState='running');}
    else{audio.pause();playBtn.textContent='▶';bars.forEach(b=>b.style.animationPlayState='paused');}
  };
  div.appendChild(playBtn);div.appendChild(wave);div.appendChild(dur);
  return div;
}

async function sendMsg(){
  const inp=document.getElementById('msgIn'),txt=inp.value.trim();if(!txt)return;
  inp.value='';shootArrow();
  await api('POST','messages',{sender:me,content:txt,seen:false});
  await loadMsgs();
}

function shootArrow(){
  const a=document.createElement('div');a.className='love-arrow';a.textContent='💘';
  const isF=me==='fawaz';
  a.style.cssText=`left:${isF?innerWidth-60:20}px;top:${innerHeight-75}px;transition:all 0.85s cubic-bezier(0.34,1.56,0.64,1);`;
  document.body.appendChild(a);
  setTimeout(()=>{a.style.left=(isF?20:innerWidth-60)+'px';a.style.top='80px';a.style.transform='scale(1.6)';},30);
  setTimeout(()=>{a.style.transform='scale(2.2) rotate(20deg)';a.style.opacity='0';},850);
  setTimeout(()=>a.remove(),1200);
}

// VOICE RECORDING
async function toggleRecord(){
  if(!isRecording){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      audioChunks=[];
      mediaRec=new MediaRecorder(stream);
      mediaRec.ondataavailable=e=>audioChunks.push(e.data);
      mediaRec.onstop=async()=>{
        const blob=new Blob(audioChunks,{type:'audio/webm'});
        const reader=new FileReader();
        reader.onload=async()=>{
          const dataUrl=reader.result;
          await api('POST','messages',{sender:me,content:'__VOICE__'+dataUrl,seen:false});
          await loadMsgs();
          stream.getTracks().forEach(t=>t.stop());
        };
        reader.readAsDataURL(blob);
      };
      mediaRec.start();
      isRecording=true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent='⏹';
      document.getElementById('recStatus').classList.add('show');
    }catch(e){alert('Mic access needed! Please allow microphone.');}
  }else{
    mediaRec.stop();
    isRecording=false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent='🎤';
    document.getElementById('recStatus').classList.remove('show');
  }
}
</script>
</body>
</html>
